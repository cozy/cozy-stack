name: Go tests
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    runs-on: ubuntu-22.04
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
    strategy:
      fail-fast: false
      matrix:
        include:
          # Recommended version
          - go-version: '1.24.x'
            couchdb-version: '3.3.3'
          # More exotic version
          - go-version: '1.21.x'
            couchdb-version: '3.2.3'
    steps:
      - name: Install CouchDB
        run: |
          curl https://couchdb.apache.org/repo/keys.asc | gpg --dearmor | sudo tee /usr/share/keyrings/couchdb-archive-keyring.gpg
          source /etc/os-release
          echo "deb [signed-by=/usr/share/keyrings/couchdb-archive-keyring.gpg] https://apache.jfrog.io/artifactory/couchdb-deb/ ${VERSION_CODENAME} main" | sudo tee /etc/apt/sources.list.d/couchdb.list
          sudo apt-get update
          sudo debconf-set-selections <<-EOF
                couchdb couchdb/mode select standalone
                couchdb couchdb/mode seen true
                couchdb couchdb/bindaddress string 127.0.0.1
                couchdb couchdb/bindaddress seen true
                couchdb couchdb/adminpass password password
                couchdb couchdb/adminpass seen true
                couchdb couchdb/adminpass_again password password
                couchdb couchdb/adminpass_again seen true
                couchdb couchdb/cookie string elmo
                couchdb couchdb/cookie seen true
          EOF
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --force-yes couchdb=${{ matrix.couchdb-version }}*
          echo "COZY_COUCHDB_URL=http://admin:password@localhost:5984/" >> $GITHUB_ENV

      - name: Install ghostscript
        run: sudo apt install ghostscript

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests
        run: go test -p 1 -timeout 5m ./...

      - name: Install build dependencies for ImageMagick
        run: sudo apt-get update && sudo apt-get install -y build-essential checkinstall libjpeg-dev libpng-dev libtiff-dev libwebp-dev libheif-dev libopenjp2-7-dev libraw-dev libfftw3-dev liblcms2-dev libxml2-dev ghostscript poppler-utils wget

      - name: Download and build ImageMagick from source
        run: |
          wget https://imagemagick.org/archive/ImageMagick.tar.gz
          tar xvzf ImageMagick.tar.gz
          cd ImageMagick-*
          ./configure --with-jpeg=yes --with-png=yes --with-tiff=yes --with-webp=yes --with-heic=yes --with-openjp2=yes --with-raw=yes --with-fftw=yes --with-lcms=yes --with-xml=yes
          make -j$(nproc)
          sudo make install
          sudo ldconfig /usr/local/lib

      - name: Change ImageMagick security policy
        run: sudo rm /usr/local/etc/ImageMagick-7/policy.xml || sudo rm /etc/ImageMagick-6/policy.xml || true
